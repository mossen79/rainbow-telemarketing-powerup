    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow Telemarketing Scripts</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
    <div id="script-container">
        <div id="script-header">
            <h2 id="script-title">Skrypt Rozmowy</h2>
            <div id="campaign-selector-box" style="margin: 8px 0;">
                <select id="campaign-selector" style="width:100%; padding:10px; font-size:16px; border-radius:6px; border:2px solid #4a90d9; background:#2a3a4a; color:#fff; cursor:pointer;">
                    <option value="odkurzacz">Odkurzacz Rainbow (nowi klienci)</option>
                    <option value="wymiana">WYMIANA stary na nowy (Belfort)</option>
                </select>
            </div>
        </div>

        <!-- Główna część skryptu (zmienia się dynamicznie) -->
        <div id="script-content">
            <div id="script-text-box">
                <div class="label">POWIEDZ:</div>
                <div id="script-text" class="speech-box-large"></div>
            </div>

            <div id="responses-section">
                <div class="label">KLIENT ODPOWIEDZIAŁ:</div>
                <div id="response-buttons" class="response-grid"></div>
            </div>
        </div>
        
        <!-- Sekcja notatek (STAŁA, nie znika) -->
        <div id="notes-section">
            <div class="label">📝 NOTATKI:</div>
            <textarea id="notes-textarea" class="notes-textarea" placeholder="Wpisz notatki z rozmowy..."></textarea>
        </div>

        <div id="script-footer">
            <button id="back-btn" class="secondary-btn" style="display:none;">← Cofnij</button>
            <button id="copy-notes-btn" class="secondary-btn success">📋 Skopiuj notatki</button>
            <button id="close-btn" class="secondary-btn">✕ Zamknij</button>
        </div>

        <div id="history-panel" style="display:none;">
            <div class="label">Historia rozmowy:</div>
            <div id="history-list"></div>
        </div>

        <!-- Error/Warning notifications -->
        <div id="notification" class="notification" style="display:none;"></div>
    </div>

    <script>
        var t = TrelloPowerUp.iframe();
        
        // SKRYPTY KAMPANII
        const SCRIPTS = {};

        // Kampania 1: Odkurzacz Rainbow (nowi klienci)
        SCRIPTS.odkurzacz = {"name":"Odkurzacz Rainbow","steps":{"start":{"name":"Powitanie","say":"Dzień dobry, nazywam się [TWOJE IMIĘ], dzwonię z firmy Rainbow System.\n\nCzy mogę rozmawiać z Panią/Panem [IMIĘ Z LEADA]?","responses":[{"label":"Tak, słucham","next":"intro"},{"label":"To nie ja / Zły numer","next":"wrong_number"},{"label":"Nie mam czasu teraz","next":"callback_request"},{"label":"Nie interesuje mnie","next":"objection_start"}]},"intro":{"name":"Wprowadzenie","say":"Dzwonię w sprawie darmowej prezentacji odkurzacza Rainbow System.\n\nCzy słyszała/słyszał Pani/Pan o tej marce?","responses":[{"label":"Tak, znam Rainbow","next":"pitch_short"},{"label":"Nie, nie znam","next":"pitch_full"},{"label":"Mam już Rainbow","next":"already_has"},{"label":"Nie interesuje mnie","next":"objection_1"}]},"pitch_full":{"name":"Pełna prezentacja oferty","say":"Rainbow to amerykański system czyszczenia z 90-letnią tradycją. Nie jest to zwykły odkurzacz - to profesjonalny system oczyszczania powietrza i czyszczenia całego domu.\n\nPrezentacja jest całkowicie darmowa, trwa około 45 minut i odbywa się w Państwa domu. Pokażemy jak Rainbow czyści dywany, materace, usunie kurz i roztocza.\n\nKiedy mogłabym/mógłbym umówić prezentację?","responses":[{"label":"Dzisiaj / Jutro","next":"book_soon"},{"label":"W tym tygodniu","next":"book_this_week"},{"label":"W weekend","next":"book_weekend"},{"label":"Muszę pomyśleć","next":"objection_think"},{"label":"To za drogie","next":"objection_price"}]},"pitch_short":{"name":"Krótka prezentacja oferty","say":"Świetnie! To Pani/Pan wie jaka to solidna marka.\n\nOrganizujemy darmowe prezentacje w domach klientów. Trwa 45 minut, pokażemy wszystkie możliwości Rainbow - czyszczenie dywanów, materaców, usuwanie roztoczy.\n\nKiedy mogłabym/mógłbym umówić prezentację?","responses":[{"label":"Dzisiaj / Jutro","next":"book_soon"},{"label":"W tym tygodniu","next":"book_this_week"},{"label":"W weekend","next":"book_weekend"},{"label":"Muszę pomyśleć","next":"objection_think"}]},"book_soon":{"name":"Umawianie na najbliższe dni","say":"Doskonale! Proszę wybrać dogodny termin z kalendarza.\n\nPrezentacje prowadzimy: 10:00, 13:00, 16:00, 18:00, 19:30","responses":[{"label":"Wybierz termin","useCalendar":true,"next":"confirm_booking"}]},"book_this_week":{"name":"Umawianie w tym tygodniu","say":"Świetnie! Proszę wybrać dogodny termin z kalendarza.\n\nPrezentacje prowadzimy: 10:00, 13:00, 16:00, 18:00, 19:30","responses":[{"label":"Wybierz termin","useCalendar":true,"next":"confirm_booking"}]},"book_weekend":{"name":"Umawianie na weekend","say":"Rozumiem, weekend to dobry czas. Proszę wybrać dogodny termin z kalendarza.\n\nPrezentacje w weekendy: Sobota (10:00, 13:00, 16:00), Niedziela (11:00, 14:00, 17:00)","responses":[{"label":"Wybierz termin","useCalendar":true,"next":"confirm_booking"}]},"custom_time":{"name":"Niestandardowy termin","say":"Oczywiście, dostosujemy się do Państwa.\n\nProszę podać preferowany dzień i godzinę, a ja sprawdzę dostępność prezentera.","responses":[{"label":"Klient podał termin - zapisz","next":"confirm_booking"},{"label":"Nie może ustalić teraz","next":"callback_request"}]},"confirm_booking":{"name":"Potwierdzenie rezerwacji","say":"Doskonale! Rezerwuję termin prezentacji Rainbow.\n\nProszę potwierdzić dane kontaktowe:\n• Numer telefonu: [NUMER Z LEADA]\n• Adres: [ZAPYTAJ O ADRES]\n\nPrześlę Pani/Panu SMS z potwierdzeniem i numerem do prezentera.\n\nDo zobaczenia!","responses":[{"label":"✅ UMÓWIONO","next":null}]},"objection_start":{"name":"Obiekcja na starcie","say":"Rozumiem. Czy mogę zapytać co konkretnie Pani/Pana nie interesuje - prezentacja czy sam odkurzacz?","responses":[{"label":"Odkurzacz (za drogi)","next":"objection_price"},{"label":"Nie mam czasu","next":"objection_time"},{"label":"Nic mnie nie interesuje","next":"end_not_interested"}]},"objection_1":{"name":"Obiekcja po intro","say":"Rozumiem Pani/Pana wątpliwości. Ale to nie jest spotkanie sprzedażowe - to darmowa prezentacja.\n\nWiele osób po prezentacji jest zaskoczonych możliwościami Rainbow. Nie traci Pani/Pan nic, pokazujemy tylko jak działa.\n\nCzy mogę umówić prezentację?","responses":[{"label":"OK, umów","next":"book_this_week"},{"label":"Dalej nie","next":"objection_final"}]},"objection_think":{"name":"Muszę pomyśleć","say":"Oczywiście, rozumiem. To ważna decyzja.\n\nCzy mogę oddzwonić jutro lub pojutrze i umówić prezentację? To nic nie kosztuje, a zobaczy Pani/Pan Rainbow na żywo.","responses":[{"label":"Tak, proszę oddzwonić","next":"callback_scheduled"},{"label":"Nie, dziękuję","next":"end_not_interested"}]},"objection_price":{"name":"Obiekcja cenowa","say":"Rozumiem obawy o cenę. Ale prawda jest taka, że Rainbow to inwestycja na 20-30 lat.\n\nOfferujemy też raty 0% i programy leasingowe. Prezentacja jest za darmo - warto zobaczyć co dostaje się za tę cenę.\n\nCzy mogę umówić prezentację?","responses":[{"label":"OK, umów prezentację","next":"book_this_week"},{"label":"To i tak za drogo","next":"end_not_interested"}]},"objection_time":{"name":"Brak czasu","say":"Rozumiem, każdy ma teraz mało czasu.\n\nPrezentacja trwa tylko 45 minut i dostosujemy się do Państwa - możemy przyjechać wieczorem, w weekend, kiedy Pani/Panu pasuje.\n\nJaki termin byłby najwygodniejszy?","responses":[{"label":"OK, umów na weekend","next":"book_weekend"},{"label":"Dalej nie mam czasu","next":"callback_request"}]},"objection_final":{"name":"Ostatnia próba","say":"Rozumiem. Może po prostu zostawię swój numer - gdyby zmieniła/zmienił Pani/Pan zdanie, proszę zadzwonić.\n\nNumer: 123-456-789\n\nDziękuję za rozmowę!","responses":[{"label":"❌ NIE ZAINTERESOWANY - Zapisz","next":null}]},"already_has":{"name":"Ma już Rainbow","say":"Wspaniale! To znaczy że zna Pani/Pan jakość Rainbow.\n\nCzy wie Pani/Pan że mamy teraz program wymiany starszych modeli na nowe z rabatem? Nowe modele mają dodatkowe funkcje.\n\nCzy mogę umówić prezentację nowego modelu?","responses":[{"label":"Tak, interesuje mnie","next":"book_this_week"},{"label":"Nie, mój działa OK","next":"end_has_rainbow"}]},"wrong_number":{"name":"Zły numer","say":"Rozumiem, przepraszam za pomyłkę.\n\nMiłego dnia!","responses":[{"label":"❌ ZŁY NUMER - Zapisz","next":null}]},"callback_request":{"name":"Prośba o telefon zwrotny","say":"Oczywiście, rozumiem.\n\nKiedy mogę oddzwonić? Jutro, pojutrze?","responses":[{"label":"Jutro (podaj godzinę)","next":"callback_scheduled"},{"label":"Za kilka dni","next":"callback_scheduled"},{"label":"Ja sam/sama zadzwonię","next":"end_callback_client"}]},"callback_scheduled":{"name":"Potwierdzenie oddzwonienia","say":"Super! Zapisuję i oddzwonię w ustalonym terminie.\n\nDziękuję, do usłyszenia!","responses":[{"label":"⏰ ODDZWONIĆ - Zapisz w Trello","next":null}]},"end_not_interested":{"name":"Koniec - nie zainteresowany","say":"Rozumiem. Dziękuję za poświęcony czas.\n\nMiłego dnia!","responses":[{"label":"❌ NIE ZAINTERESOWANY - Zapisz","next":null}]},"end_has_rainbow":{"name":"Koniec - ma Rainbow","say":"Cieszę się że Rainbow Państwu służy!\n\nGdyby w przyszłości potrzebowali Państwo serwisu lub akcesoriów - proszę dzwonić.\n\nMiłego dnia!","responses":[{"label":"✅ MA JUŻ RAINBOW - Zapisz","next":null}]},"end_callback_client":{"name":"Koniec - klient oddzwoni","say":"Oczywiście! Mój numer: 123-456-789\n\nCzekam na telefon. Miłego dnia!","responses":[{"label":"📞 KLIENT ODDZWONI - Zapisz","next":null}]}}};

        // Kampania 2: WYMIANA stary na nowy (Belfort Straight Line + DLF)
        SCRIPTS.wymiana = {"name":"Rainbow WYMIANA - Stary na Nowy","steps":{"start":{"name":"Powitanie","say":"Halo, dzień dobry! Czy rozmawiam z Panią/Panem [IMIĘ Z LEADA]?\n\n[ENERGIA! Uśmiech! Mów jakby to był jedyny telefon dzisiaj]","responses":[{"label":"Tak, słucham","next":"intro_wymiana"},{"label":"To nie ja / Zły numer","next":"wrong_number"},{"label":"Nie mam czasu teraz","next":"callback_request"},{"label":"Nie interesuje mnie","next":"objection_start"}]},"intro_wymiana":{"name":"Wprowadzenie - kampania wymiana","say":"Dzień dobry Pani/Panie [IMIĘ]! Mam na imię [TWOJE IMIĘ], dzwonię z firmy Rainbow.\n\nZostawili Państwo kontakt na naszej stronie w sprawie wymiany odkurzacza -- pamiętają Państwo?\n\n[Jeśli NIE pamięta: \"Nic nie szkodzi, w skrócie...\"]","responses":[{"label":"Tak, pamiętam","next":"pitch_wymiana"},{"label":"Nie pamiętam / O co chodzi?","next":"pitch_wymiana"},{"label":"Mam Rainbow ale nie chcę wymieniać","next":"objection_nie_chce"},{"label":"Nie mam Rainbow","next":"end_no_rainbow"}]},"pitch_wymiana":{"name":"Prezentacja oferty wymiany","say":"Mamy teraz specjalny program dla naszych dotychczasowych klientów.\n\nDotyczy BEZPŁATNEGO PRZEGLĄDU Państwa obecnego Rainbow i możliwości WYMIANY starego modelu na najnowszy, z zaliczeniem wartości obecnego urządzenia.\n\nPrzegląd jest całkowicie bezpłatny i do niczego nie zobowiązuje. Serwisant przyjedzie, sprawdzi stan urządzenia, wyceni je i przedstawi ofertę wymiany.\n\nCzy byliby Państwo zainteresowani takim bezpłatnym przeglądem?","responses":[{"label":"Tak, interesuje","next":"kwalifikacja"},{"label":"Ile kosztuje wymiana?","next":"objection_cena"},{"label":"Muszę pomyśleć","next":"objection_think"},{"label":"Nie, dziękuję","next":"objection_start"}]},"kwalifikacja":{"name":"Kwalifikacja + pytanie o model","say":"Doskonale! Żeby serwisant mógł się odpowiednio przygotować, mam kilka szybkich pytań.\n\n1. Jaki model Rainbow Państwo mają -- pamiętają Państwo mniej więcej z jakiego roku?\n\n2. Urządzenie działa normalnie, czy są jakieś problemy?\n\n[NOTUJ odpowiedzi -- ważne dla serwisanta]","responses":[{"label":"Podał model / rok -- NOTUJ","next":"pytanie_malzonek"},{"label":"Nie pamięta modelu","next":"pytanie_malzonek"}]},"pytanie_malzonek":{"name":"⚠️ KRYTYCZNE: Pytanie o małżonka","say":"Rozumiem. A mieszkają Państwo z mężem/żoną?\n\n[TO PYTANIE JEST OBOWIĄZKOWE! Od odpowiedzi zależy dalszy przebieg!]","responses":[{"label":"Tak, z mężem/żoną","next":"wymuszenie_dwoch_nog"},{"label":"Nie, mieszkam sam/sama","next":"pytanie_inny_domownik"}]},"pytanie_inny_domownik":{"name":"Pytanie o innego domownika","say":"Rozumiem. A czy w domu mieszka ktoś z Panią/Panem -- dorosłe dziecko, rodzic?\n\nBo pokaz dotyczy całego domu i fajnie jakby ta osoba też mogła być obecna.","responses":[{"label":"Tak, ktoś mieszka -- będzie obecny","next":"book_termin"},{"label":"Nie, mieszkam zupełnie sam/sama","next":"book_termin"}]},"wymuszenie_dwoch_nog":{"name":"⭐ BELFORT: Wymuszenie DWÓCH NÓG","say":"Pani/Panie [IMIĘ], jeszcze jedno ważne.\n\nŻeby serwisant mógł W PEŁNI WYCENIĆ Państwa obecne urządzenie i przygotować NAJLEPSZĄ MOŻLIWĄ OFERTĘ WYMIANY -- potrzebujemy żeby oboje Państwo byli w domu.\n\nSerwisant omówi z Państwem różne warianty, więc ważne żeby oboje mogli zadecydować na spokojnie.\n\nPan/Pani [IMIĘ MAŁŻONKA] też będzie, prawda?\n\n[PRESUPOZYCJA -- zakładaj że TAK!]","responses":[{"label":"✅ Tak, oboje będziemy","next":"book_termin"},{"label":"Mąż/żona w pracy / nie będzie","next":"rebuttal_praca"},{"label":"Ja sam/sama decyduję","next":"rebuttal_sam_decyduje"},{"label":"Męża/żonę to nie obchodzi","next":"rebuttal_nie_obchodzi"}]},"rebuttal_praca":{"name":"Rebuttal: Mąż/żona w pracy","say":"Jasne, całkowicie rozumiem! Właśnie dlatego pytam wcześniej -- żeby znaleźć termin który pasuje obojgu.\n\nNasi serwisanci pracują też wieczorami i w weekendy.\n\nKiedy oboje Państwo macie spokojniejszy wieczór -- może sobota albo niedziela?","responses":[{"label":"✅ OK, znajdziemy wspólny termin","next":"book_termin"},{"label":"Pracuje na zmiany, trudno ustalić","next":"rebuttal_zmiany"},{"label":"Niech przyjdzie, mąż/żona potem zobaczy","next":"rebuttal_potem_zobaczy"}]},"rebuttal_sam_decyduje":{"name":"Rebuttal: Ja sam/sama decyduję","say":"Wierzę Pani/Panu w stu procentach!\n\nAle proszę zobaczyć -- serwisant będzie omawiał wycenę Państwa obecnego Rainbow, warianty wymiany, ewentualnie raty. To decyzja finansowa która dotyczy obojga.\n\nGdyby potem musiała Pani to wszystko tłumaczyć mężowi... a on nie widział wyceny, nie słyszał wariantów -- to potem wychodzi niepotrzebne 'ale dlaczego nie poczekałaś'.\n\nLepsza jest ta godzina razem niż potem tydzień dyskusji w domu, prawda?\n\nZnajdźmy termin kiedy oboje Państwo mają chwilę.","responses":[{"label":"✅ OK, umówmy kiedy oboje będziemy","next":"book_termin"},{"label":"Nadal chcę sam/sama","next":"rebuttal_potem_zobaczy"}]},"rebuttal_nie_obchodzi":{"name":"Rebuttal: Męża/żonę to nie obchodzi","say":"Wie Pani/Pan co jest ciekawe? Większość mężów/żon mówi tak samo przed wizytą!\n\nA potem jak widzą ile jest wart ich stary Rainbow na wymianę i co potrafi nowy model -- to nagle są bardzo zainteresowani!\n\nNie musi być zainteresowany/a teraz -- wystarczy że będzie w domu. Godzinka i oboje Państwo będziecie wiedzieli na czym stoicie.\n\nMożemy się umówić na sobotę albo niedzielę?","responses":[{"label":"✅ OK, spróbuję go/ją namówić","next":"book_termin"},{"label":"Na pewno nie przyjdzie","next":"rebuttal_potem_zobaczy"}]},"rebuttal_zmiany":{"name":"Rebuttal: Pracuje na zmiany","say":"Rozumiem, to bywa trudne.\n\nA kiedy w najbliższych DWÓCH TYGODNIACH macie taki wieczór kiedy oboje jesteście w domu? Może jakiś wolny dzień, weekend?\n\nDostosujemy się całkowicie pod Państwa grafik.","responses":[{"label":"✅ Znajdziemy termin za tydzień-dwa","next":"book_termin"},{"label":"Naprawdę ciężko ustalić","next":"rebuttal_ostateczny"}]},"rebuttal_potem_zobaczy":{"name":"Rebuttal: Niech przyjdzie, mąż potem zobaczy","say":"Pani/Panie [IMIĘ], naprawdę chcę żeby ta wizyta miała dla Państwa sens.\n\nSerwisant będzie wyceniał Państwa stary Rainbow, pokazywał różnicę z nowym modelem, omawiał warianty finansowe.\n\nJeśli mąż/żona tego nie zobaczy na własne oczy -- to potem nie może podjąć decyzji, bo nie ma pełnego obrazu. I spotykamy się jeszcze raz, a to strata czasu i dla Państwa, i dla nas.\n\nJedna wspólna godzina -- i oboje macie pełną wiedzę.\n\nKiedy oboje będziecie w domu?","responses":[{"label":"✅ OK, przekonał/a mnie -- szukamy terminu","next":"book_termin"},{"label":"Nadal upiera się na jedną osobę","next":"rebuttal_ostateczny"}]},"rebuttal_ostateczny":{"name":"⛔ Ostateczny rebuttal -- CALLBACK","say":"Rozumiem. Zróbmy tak:\n\nNiech Pani/Pan porozmawia z mężem/żoną kiedy ma wolny wieczór, a ja zadzwonię do Pani/Pana JUTRO o tej samej porze i ustalimy termin.\n\nPasuje?\n\n[⛔ NIGDY NIE UMAWIAJ NA JEDNĄ NOGĘ! CALLBACK!]","responses":[{"label":"⏰ OK, zadzwoń jutro -- CALLBACK","next":"callback_scheduled"},{"label":"❌ Nie, rezygnuję w ogóle","next":"end_not_interested"}]},"book_termin":{"name":"Umawianie terminu (oboje potwierdzeni!)","say":"Świetnie! To kiedy oboje Państwo będą w domu wieczorem?\n\nNasi serwisanci pracują:\n• Poniedziałek-Piątek: 10:00, 14:00, 16:00, 18:00\n• Sobota: 10:00, 13:00, 16:00\n• Niedziela: 11:00, 14:00, 17:00\n\nKtóry dzień i godzina Państwu pasuje?","responses":[{"label":"Dzisiaj / Jutro","next":"confirm_booking"},{"label":"W tym tygodniu (pon-pt)","next":"confirm_booking"},{"label":"Weekend (sob/ndz)","next":"confirm_booking"},{"label":"Za tydzień lub później","next":"confirm_booking"}]},"confirm_booking":{"name":"⭐ Potwierdzenie + 3 WARUNKI","say":"Doskonale! Umawiamy Państwa na [DZIEŃ, DATA] o godzinie [GODZINA].\n\nAdres to [POTWIERDŹ ADRES] -- zgadza się?\n\nJeszcze TRZY ważne rzeczy:\n\n1️⃣ Proszę PRZYGOTOWAĆ Państwa obecny Rainbow żeby serwisant mógł go obejrzeć i wycenić.\n\n2️⃣ Proszę NIE ZAPRASZAĆ sąsiadów ani znajomych -- serwisant będzie omawiał Państwa indywidualną ofertę i warunki finansowe.\n\n3️⃣ Proszę żeby [IMIĘ MAŁŻONKA] NA PEWNO był/a w domu. To naprawdę ważne żeby oboje Państwo widzieli ofertę.\n\nUmówione?\n\n[WYŚLIJ SMS POTWIERDZAJĄCY!]","responses":[{"label":"✅ UMÓWIONO (oboje potwierdzeni) - Zapisz","next":null}]},"objection_start":{"name":"Obiekcja na starcie","say":"Rozumiem. Ale proszę zobaczyć -- przegląd jest CAŁKOWICIE bezpłatny.\n\nSerwisant sprawdzi stan Państwa Rainbow, wyceni go i przedstawi ofertę. Jeśli oferta nie odpowiada -- nic nie tracą Państwo.\n\nA może się okazać że stary Rainbow jest wart więcej niż Państwo myśleli!","responses":[{"label":"OK, umów przegląd","next":"kwalifikacja"},{"label":"Ile kosztuje wymiana?","next":"objection_cena"},{"label":"Naprawdę nie chcę","next":"end_not_interested"}]},"objection_cena":{"name":"Obiekcja cenowa","say":"Przegląd i wycena są całkowicie bezpłatne.\n\nJeśli chodzi o wymianę -- to zależy od stanu Państwa obecnego urządzenia. Dlatego serwisant musi je obejrzeć i wycenić.\n\nWartość starego Rainbow ZALICZA SIĘ na poczet nowego -- szczegóły poda serwisant na miejscu.\n\nWarto zobaczyć, bo to nic nie kosztuje!","responses":[{"label":"OK, umów przegląd","next":"kwalifikacja"},{"label":"Nie stać mnie","next":"end_not_interested"}]},"objection_nie_chce":{"name":"Nie chce wymieniać","say":"Rozumiem! Ale nawet jeśli nie chcą Państwo wymieniać -- przegląd jest bezpłatny.\n\nIm w lepszym stanie Państwa urządzenie, tym wyższa jego wartość. Warto wycenić teraz, bo programy wymian nie trwają wiecznie.\n\nA przegląd i tak jest za darmo -- więc nic Państwa to nie kosztuje.","responses":[{"label":"OK, niech wyceni","next":"kwalifikacja"},{"label":"Moje działa, nic nie potrzebuję","next":"end_has_rainbow"}]},"objection_think":{"name":"Muszę pomyśleć","say":"Oczywiście! Przegląd jest bezpłatny, więc nie ma żadnego ryzyka.\n\nUmówmy termin -- a gdyby coś się zmieniło, zawsze można przenieść.\n\nLepsza rezerwacja teraz, bo terminy serwisantów szybko się zapełniają.","responses":[{"label":"OK, umów","next":"kwalifikacja"},{"label":"Zadzwońcie za kilka dni","next":"callback_request"},{"label":"Nie, dziękuję","next":"end_not_interested"}]},"wrong_number":{"name":"Zły numer","say":"Rozumiem, przepraszam za pomyłkę. Miłego dnia!","responses":[{"label":"❌ ZŁY NUMER - Zapisz","next":null}]},"callback_request":{"name":"Prośba o callback","say":"Oczywiście, rozumiem.\n\nKiedy mogę oddzwonić? Jutro, pojutrze?","responses":[{"label":"Jutro (podaj godzinę)","next":"callback_scheduled"},{"label":"Za kilka dni","next":"callback_scheduled"},{"label":"Ja sam/sama zadzwonię","next":"end_callback_client"}]},"callback_scheduled":{"name":"Callback zaplanowany","say":"Super! Zapisuję i oddzwonię w ustalonym terminie.\n\nDziękuję, do usłyszenia!","responses":[{"label":"⏰ CALLBACK - Zapisz w Trello","next":null}]},"end_not_interested":{"name":"Koniec - nie zainteresowany","say":"Rozumiem. Dziękuję za poświęcony czas.\n\nMiłego dnia!","responses":[{"label":"❌ NIE ZAINTERESOWANY - Zapisz","next":null}]},"end_has_rainbow":{"name":"Koniec - ma Rainbow, nie chce wymiany","say":"Cieszę się że Rainbow Państwu służy!\n\nGdyby w przyszłości chcieli Państwo skorzystać z programu wymiany -- proszę dzwonić.\n\nMiłego dnia!","responses":[{"label":"✅ MA RAINBOW, NIE CHCE WYMIANY - Zapisz","next":null}]},"end_no_rainbow":{"name":"Koniec - nie ma Rainbow","say":"Rozumiem, ten program jest dla obecnych właścicieli Rainbow.\n\nGdyby chcieli Państwo zobaczyć prezentację nowego Rainbow -- mogę umówić bezpłatny pokaz.\n\nMiłego dnia!","responses":[{"label":"❌ NIE MA RAINBOW - Zapisz","next":null}]},"end_callback_client":{"name":"Koniec - klient oddzwoni","say":"Oczywiście! Nasz numer: [NUMER FIRMY]\n\nCzekam na telefon. Miłego dnia!","responses":[{"label":"📞 KLIENT ODDZWONI - Zapisz","next":null}]}}};

        // Domyślna kampania
        let SCRIPT_DATA = SCRIPTS.odkurzacz;

        class ScriptEngine {
            constructor(scriptData) {
                this.scriptData = scriptData;
                this.currentStep = 'start';
                this.history = [];
            }

            getCurrentStep() {
                if (!this.scriptData || !this.scriptData.steps[this.currentStep]) {
                    return null;
                }
                return this.scriptData.steps[this.currentStep];
            }

            selectResponse(responseIndex) {
                const currentStep = this.getCurrentStep();
                if (!currentStep || !currentStep.responses[responseIndex]) {
                    return false;
                }

                const response = currentStep.responses[responseIndex];

                this.history.push({
                    step: this.currentStep,
                    stepName: currentStep.name || this.currentStep,
                    said: currentStep.say,
                    response: response.label
                });

                if (response.next === null) {
                    return { end: true, outcome: response.label };
                } else {
                    this.currentStep = response.next;
                    return { end: false };
                }
            }

            goBack() {
                if (this.history.length === 0) {
                    return false;
                }

                this.history.pop();

                if (this.history.length > 0) {
                    const lastHistory = this.history[this.history.length - 1];
                    const lastStep = this.scriptData.steps[lastHistory.step];
                    const lastResponse = lastStep.responses.find(r => r.label === lastHistory.response);
                    this.currentStep = lastResponse.next;
                } else {
                    this.currentStep = 'start';
                }

                return true;
            }

            getHistory() {
                return this.history;
            }
        }

        class ScriptUI {
            constructor(engine) {
                this.engine = engine;
                this.initElements();
                this.attachEventListeners();
                this.render();
            }

            initElements() {
                this.scriptText = document.getElementById('script-text');
                this.responseButtons = document.getElementById('response-buttons');
                this.backBtn = document.getElementById('back-btn');
                this.closeBtn = document.getElementById('close-btn');
                this.historyPanel = document.getElementById('history-panel');
                this.historyList = document.getElementById('history-list');
            }

            attachEventListeners() {
                this.backBtn.addEventListener('click', () => this.handleBack());
                this.closeBtn.addEventListener('click', () => this.handleClose());
                
                const copyBtn = document.getElementById('copy-notes-btn');
                if (copyBtn) {
                    copyBtn.addEventListener('click', () => this.handleCopyNotes());
                }
            }
            
            handleCopyNotes() {
                const notesTextarea = document.getElementById('notes-textarea');
                if (notesTextarea && notesTextarea.value.trim()) {
                    notesTextarea.select();
                    document.execCommand('copy');
                    this.showNotification('✓ Notatki skopiowane do schowka', 'success');
                } else {
                    this.showNotification('Brak notatek do skopiowania', 'warning');
                }
            }

            render() {
                const step = this.engine.getCurrentStep();

                if (!step) {
                    this.showError('Błąd: brak kroku');
                    return;
                }

                this.scriptText.textContent = step.say;
                this.responseButtons.innerHTML = '';

                step.responses.forEach((response, index) => {
                    // ZAWSZE używamy standardowych przycisków, bez kalendarza
                    const button = document.createElement('button');
                    button.className = 'response-btn';
                    button.textContent = response.label;

                    if (response.label.includes('UMÓWIONO') || response.label.toLowerCase().includes('umówiono')) {
                        button.classList.add('success');
                    } else if (response.label.includes('NIE ZAINTERESOWANY') || response.label.includes('ZŁY NUMER')) {
                        button.classList.add('danger');
                    } else if (response.label.includes('ODDZWONIĆ') || response.label.toLowerCase().includes('później')) {
                        button.classList.add('warning');
                    }

                    button.addEventListener('click', () => this.handleResponse(index));
                    this.responseButtons.appendChild(button);
                });

                this.backBtn.style.display = this.engine.history.length > 0 ? 'block' : 'none';
                this.updateHistory();
            }

            handleResponse(index) {
                const result = this.engine.selectResponse(index);

                if (result.end) {
                    this.showSimpleEndScreen(result.outcome);
                } else {
                    this.render();
                }
            }
            
            showSimpleEndScreen(outcome) {
                const container = document.getElementById('script-content');
                // Czyścimy tylko część skryptową, notatki są poniżej w osobnym divie
                container.innerHTML = `
                    <div class="end-screen">
                        <h3>✅ Rozmowa zakończona</h3>
                        <p><strong>Wynik:</strong> ${outcome}</p>
                        <p style="margin-top: 20px;">Skopiuj notatki i zamknij okno.</p>
                    </div>
                `;
                
                this.closeBtn.textContent = '✕ Zamknij';
                this.backBtn.style.display = 'none';
            }

            handleBack() {
                const success = this.engine.goBack();
                if (success) {
                    this.render();
                }
            }

            handleClose() {
                t.closeModal();
            }

            updateHistory() {
                const history = this.engine.getHistory();

                if (history.length === 0) {
                    this.historyPanel.style.display = 'none';
                    return;
                }

                this.historyPanel.style.display = 'block';
                this.historyList.innerHTML = '';

                history.forEach((item, index) => {
                    const historyItem = document.createElement('div');
                    historyItem.className = 'history-item';
                    historyItem.textContent = `${index + 1}. ${item.stepName || 'Krok'} -> ${item.response}`;
                    this.historyList.appendChild(historyItem);
                });
            }

            showNotification(message, type = 'info') {
                const notification = document.getElementById('notification');
                notification.textContent = message;
                notification.className = `notification notification-${type}`;
                notification.style.display = 'block';
                
                // Auto-hide after 5 seconds
                setTimeout(() => {
                    notification.style.display = 'none';
                }, 5000);
            }

            showError(message) {
                const container = document.getElementById('script-content');
                container.innerHTML = `
                    <div class="end-screen">
                        <h3>Błąd</h3>
                        <p>${message}</p>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            let scriptEngine = new ScriptEngine(SCRIPT_DATA);
            let scriptUI = new ScriptUI(scriptEngine);
            document.getElementById('script-title').textContent = SCRIPT_DATA.name;

            // Przełączanie kampanii
            document.getElementById('campaign-selector').addEventListener('change', function(e) {
                SCRIPT_DATA = SCRIPTS[e.target.value];
                scriptEngine = new ScriptEngine(SCRIPT_DATA);
                document.getElementById('script-title').textContent = SCRIPT_DATA.name;
                // Przywróć oryginalny HTML script-content
                document.getElementById('script-content').innerHTML = `
                    <div id="script-text-box">
                        <div class="label">POWIEDZ:</div>
                        <div id="script-text" class="speech-box-large"></div>
                    </div>
                    <div id="responses-section">
                        <div class="label">KLIENT ODPOWIEDZIAŁ:</div>
                        <div id="response-buttons" class="response-grid"></div>
                    </div>
                `;
                scriptUI = new ScriptUI(scriptEngine);
                // Wyczyść notatki przy zmianie kampanii
                const notes = document.getElementById('notes-textarea');
                if (notes) notes.value = '';
            });
        });
    </script>
