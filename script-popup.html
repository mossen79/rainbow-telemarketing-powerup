    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow Telemarketing Scripts</title>
    <link rel="stylesheet" href="styles.css?v=6">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
    <div id="script-container">
        <div id="script-header">
            <h2 id="script-title">Skrypt Rozmowy</h2>
            <div id="campaign-selector-box" style="margin: 8px 0;">
                <select id="campaign-selector" style="width:100%; padding:10px; font-size:16px; border-radius:6px; border:2px solid #4a90d9; background:#2a3a4a; color:#fff; cursor:pointer;">
                    <option value="odkurzacz">Odkurzacz Rainbow (nowi klienci)</option>
                    <option value="wymiana">WYMIANA stary na nowy (Belfort)</option>
                </select>
            </div>
        </div>

        <!-- Główna część skryptu (zmienia się dynamicznie) -->
        <div id="script-content">
            <div id="script-text-box">
                <div class="label">POWIEDZ:</div>
                <div id="script-text" class="speech-box-large"></div>
                <div id="script-tip" class="tip-box" style="display:none;"></div>
            </div>

            <div id="responses-section">
                <div class="label">KLIENT ODPOWIEDZIAŁ:</div>
                <div id="response-buttons" class="response-grid"></div>
            </div>
        </div>
        
        <!-- Sekcja notatek (STAŁA, nie znika) -->
        <div id="notes-section">
            <div class="label">📝 NOTATKI:</div>
            <textarea id="notes-textarea" class="notes-textarea" placeholder="Wpisz notatki z rozmowy..."></textarea>
        </div>

        <div id="script-footer">
            <button id="back-btn" class="secondary-btn" style="display:none;">← Cofnij</button>
            <button id="copy-notes-btn" class="secondary-btn success">📋 Skopiuj notatki</button>
            <button id="close-btn" class="secondary-btn">✕ Zamknij</button>
        </div>

        <div id="history-panel" style="display:none;">
            <div class="label">Historia rozmowy:</div>
            <div id="history-list"></div>
        </div>

        <!-- Error/Warning notifications -->
        <div id="notification" class="notification" style="display:none;"></div>
    </div>

    <script>
        var t = TrelloPowerUp.iframe();
        
        // SKRYPTY KAMPANII
        const SCRIPTS = {};

        // Kampania 1: Odkurzacz Rainbow (nowi klienci)
        SCRIPTS.odkurzacz = {"name":"Odkurzacz Rainbow","steps":{"start":{"name":"Powitanie","say":"Dzień dobry, nazywam się [TWOJE IMIĘ], dzwonię z firmy Rainbow System.\n\nCzy mogę rozmawiać z Panią/Panem [IMIĘ Z LEADA]?","responses":[{"label":"Tak, słucham","next":"intro"},{"label":"To nie ja / Zły numer","next":"wrong_number"},{"label":"Nie mam czasu teraz","next":"callback_request"},{"label":"Nie interesuje mnie","next":"objection_start"}]},"intro":{"name":"Wprowadzenie","say":"Dzwonię w sprawie darmowej prezentacji odkurzacza Rainbow System.\n\nCzy słyszała/słyszał Pani/Pan o tej marce?","responses":[{"label":"Tak, znam Rainbow","next":"pitch_short"},{"label":"Nie, nie znam","next":"pitch_full"},{"label":"Mam już Rainbow","next":"already_has"},{"label":"Nie interesuje mnie","next":"objection_1"}]},"pitch_full":{"name":"Pełna prezentacja oferty","say":"Rainbow to amerykański system czyszczenia z 90-letnią tradycją. Nie jest to zwykły odkurzacz - to profesjonalny system oczyszczania powietrza i czyszczenia całego domu.\n\nPrezentacja jest całkowicie darmowa, trwa około 45 minut i odbywa się w Państwa domu. Pokażemy jak Rainbow czyści dywany, materace, usunie kurz i roztocza.\n\nKiedy mogłabym/mógłbym umówić prezentację?","responses":[{"label":"Dzisiaj / Jutro","next":"book_soon"},{"label":"W tym tygodniu","next":"book_this_week"},{"label":"W weekend","next":"book_weekend"},{"label":"Muszę pomyśleć","next":"objection_think"},{"label":"To za drogie","next":"objection_price"}]},"pitch_short":{"name":"Krótka prezentacja oferty","say":"Świetnie! To Pani/Pan wie jaka to solidna marka.\n\nOrganizujemy darmowe prezentacje w domach klientów. Trwa 45 minut, pokażemy wszystkie możliwości Rainbow - czyszczenie dywanów, materaców, usuwanie roztoczy.\n\nKiedy mogłabym/mógłbym umówić prezentację?","responses":[{"label":"Dzisiaj / Jutro","next":"book_soon"},{"label":"W tym tygodniu","next":"book_this_week"},{"label":"W weekend","next":"book_weekend"},{"label":"Muszę pomyśleć","next":"objection_think"}]},"book_soon":{"name":"Umawianie na najbliższe dni","say":"Doskonale! Proszę wybrać dogodny termin z kalendarza.\n\nPrezentacje prowadzimy: 10:00, 13:00, 16:00, 18:00, 19:30","responses":[{"label":"Wybierz termin","useCalendar":true,"next":"confirm_booking"}]},"book_this_week":{"name":"Umawianie w tym tygodniu","say":"Świetnie! Proszę wybrać dogodny termin z kalendarza.\n\nPrezentacje prowadzimy: 10:00, 13:00, 16:00, 18:00, 19:30","responses":[{"label":"Wybierz termin","useCalendar":true,"next":"confirm_booking"}]},"book_weekend":{"name":"Umawianie na weekend","say":"Rozumiem, weekend to dobry czas. Proszę wybrać dogodny termin z kalendarza.\n\nPrezentacje w weekendy: Sobota (10:00, 13:00, 16:00), Niedziela (11:00, 14:00, 17:00)","responses":[{"label":"Wybierz termin","useCalendar":true,"next":"confirm_booking"}]},"custom_time":{"name":"Niestandardowy termin","say":"Oczywiście, dostosujemy się do Państwa.\n\nProszę podać preferowany dzień i godzinę, a ja sprawdzę dostępność prezentera.","responses":[{"label":"Klient podał termin - zapisz","next":"confirm_booking"},{"label":"Nie może ustalić teraz","next":"callback_request"}]},"confirm_booking":{"name":"Potwierdzenie rezerwacji","say":"Doskonale! Rezerwuję termin prezentacji Rainbow.\n\nProszę potwierdzić dane kontaktowe:\n• Numer telefonu: [NUMER Z LEADA]\n• Adres: [ZAPYTAJ O ADRES]\n\nPrześlę Pani/Panu SMS z potwierdzeniem i numerem do prezentera.\n\nDo zobaczenia!","responses":[{"label":"✅ UMÓWIONO","next":null}]},"objection_start":{"name":"Obiekcja na starcie","say":"Rozumiem. Czy mogę zapytać co konkretnie Pani/Pana nie interesuje - prezentacja czy sam odkurzacz?","responses":[{"label":"Odkurzacz (za drogi)","next":"objection_price"},{"label":"Nie mam czasu","next":"objection_time"},{"label":"Nic mnie nie interesuje","next":"end_not_interested"}]},"objection_1":{"name":"Obiekcja po intro","say":"Rozumiem Pani/Pana wątpliwości. Ale to nie jest spotkanie sprzedażowe - to darmowa prezentacja.\n\nWiele osób po prezentacji jest zaskoczonych możliwościami Rainbow. Nie traci Pani/Pan nic, pokazujemy tylko jak działa.\n\nCzy mogę umówić prezentację?","responses":[{"label":"OK, umów","next":"book_this_week"},{"label":"Dalej nie","next":"objection_final"}]},"objection_think":{"name":"Muszę pomyśleć","say":"Oczywiście, rozumiem. To ważna decyzja.\n\nCzy mogę oddzwonić jutro lub pojutrze i umówić prezentację? To nic nie kosztuje, a zobaczy Pani/Pan Rainbow na żywo.","responses":[{"label":"Tak, proszę oddzwonić","next":"callback_scheduled"},{"label":"Nie, dziękuję","next":"end_not_interested"}]},"objection_price":{"name":"Obiekcja cenowa","say":"Rozumiem obawy o cenę. Ale prawda jest taka, że Rainbow to inwestycja na 20-30 lat.\n\nOfferujemy też raty 0% i programy leasingowe. Prezentacja jest za darmo - warto zobaczyć co dostaje się za tę cenę.\n\nCzy mogę umówić prezentację?","responses":[{"label":"OK, umów prezentację","next":"book_this_week"},{"label":"To i tak za drogo","next":"end_not_interested"}]},"objection_time":{"name":"Brak czasu","say":"Rozumiem, każdy ma teraz mało czasu.\n\nPrezentacja trwa tylko 45 minut i dostosujemy się do Państwa - możemy przyjechać wieczorem, w weekend, kiedy Pani/Panu pasuje.\n\nJaki termin byłby najwygodniejszy?","responses":[{"label":"OK, umów na weekend","next":"book_weekend"},{"label":"Dalej nie mam czasu","next":"callback_request"}]},"objection_final":{"name":"Ostatnia próba","say":"Rozumiem. Może po prostu zostawię swój numer - gdyby zmieniła/zmienił Pani/Pan zdanie, proszę zadzwonić.\n\nNumer: 123-456-789\n\nDziękuję za rozmowę!","responses":[{"label":"❌ NIE ZAINTERESOWANY - Zapisz","next":null}]},"already_has":{"name":"Ma już Rainbow","say":"Wspaniale! To znaczy że zna Pani/Pan jakość Rainbow.\n\nCzy wie Pani/Pan że mamy teraz program wymiany starszych modeli na nowe z rabatem? Nowe modele mają dodatkowe funkcje.\n\nCzy mogę umówić prezentację nowego modelu?","responses":[{"label":"Tak, interesuje mnie","next":"book_this_week"},{"label":"Nie, mój działa OK","next":"end_has_rainbow"}]},"wrong_number":{"name":"Zły numer","say":"Rozumiem, przepraszam za pomyłkę.\n\nMiłego dnia!","responses":[{"label":"❌ ZŁY NUMER - Zapisz","next":null}]},"callback_request":{"name":"Prośba o telefon zwrotny","say":"Oczywiście, rozumiem.\n\nKiedy mogę oddzwonić? Jutro, pojutrze?","responses":[{"label":"Jutro (podaj godzinę)","next":"callback_scheduled"},{"label":"Za kilka dni","next":"callback_scheduled"},{"label":"Ja sam/sama zadzwonię","next":"end_callback_client"}]},"callback_scheduled":{"name":"Potwierdzenie oddzwonienia","say":"Super! Zapisuję i oddzwonię w ustalonym terminie.\n\nDziękuję, do usłyszenia!","responses":[{"label":"⏰ ODDZWONIĆ - Zapisz w Trello","next":null}]},"end_not_interested":{"name":"Koniec - nie zainteresowany","say":"Rozumiem. Dziękuję za poświęcony czas.\n\nMiłego dnia!","responses":[{"label":"❌ NIE ZAINTERESOWANY - Zapisz","next":null}]},"end_has_rainbow":{"name":"Koniec - ma Rainbow","say":"Cieszę się że Rainbow Państwu służy!\n\nGdyby w przyszłości potrzebowali Państwo serwisu lub akcesoriów - proszę dzwonić.\n\nMiłego dnia!","responses":[{"label":"✅ MA JUŻ RAINBOW - Zapisz","next":null}]},"end_callback_client":{"name":"Koniec - klient oddzwoni","say":"Oczywiście! Mój numer: 123-456-789\n\nCzekam na telefon. Miłego dnia!","responses":[{"label":"📞 KLIENT ODDZWONI - Zapisz","next":null}]}}};

        // Kampania 2: WYMIANA stary na nowy (Belfort Straight Line + DLF)
        SCRIPTS.wymiana = {"name":"WYMIANA Rainbow","version":"4.0_Edycja_Belforta","campaign":"wymiana","steps":{"start":{"name":"Powitanie","say":"Halo, dzień dobry! Czy rozmawiam z Panią/Panem [IMIĘ]?","tip":"Uśmiech! Energia! Pierwsze 4 sekundy decydują. Czekaj na 'tak'.","responses":[{"label":"Tak","next":"intro"},{"label":"Nie ma teraz","next":"callback"},{"label":"Zły numer","next":"end_wrong_number"}]},"intro":{"name":"Przedstawienie i Powód","say":"Marta z tej strony... (pauza 2 sekundy)\n\nZostawili Państwo kontakt na naszej stronie w sprawie wymiany starego modelu Rainbow na Nowy -- zgadza się, prawda?","tip":"Pauza 2 sekundy po swoim imieniu buduje autorytet i łapie uważność!","responses":[{"label":"Tak / Zgadza się","next":"pitch"},{"label":"Nie pamiętam","next":"pitch"},{"label":"Nie mam czasu","next":"callback"},{"label":"Nie mam Rainbow","next":"end_no_rainbow"}]},"pitch":{"name":"Przedstawienie oferty","say":"(Jeśli TAK: Świetnie! / Jeśli NIE: Nic nie szkodzi, w skrócie...)\n\nDzwonię bo mamy teraz specjalny program dla naszych klientów. Dotyczy BEZPŁATNEGO PRZEGLĄDU Państwa obecnego Rainbow i możliwości WYMIANY starego modelu na najnowszy, z zaliczeniem wartości obecnego urządzenia.\n\nPrzegląd jest całkowicie bezpłatny i oczywiście do niczego nie zobowiązuje. Nasz serwisant przyjedzie, sprawdzi stan Państwa urządzenia, wyceni je i przedstawi ofertę wymiany.\n\nŻeby serwisant mógł się odpowiednio przygotować, mam kilka szybkich pytań. Możemy kontynuować?","tip":"Mów z entuzjazmem. To Ty masz dla nich świetną wiadomość, nie odwrotnie.","responses":[{"label":"Tak / Może","next":"kwalifikacja_model"},{"label":"Ile kosztuje?","next":"objection_cena"},{"label":"Muszę pomyśleć","next":"objection_pomyslec"},{"label":"Nie, dziękuję","next":"end_not_interested"}]},"kwalifikacja_model":{"name":"Kwalifikacja: model","say":"Jaki model Rainbow Państwo mają -- pamiętają Państwo mniej więcej z jakiego roku?","tip":"ZAPISZ model i rok!","responses":[{"label":"Podał model/rok","next":"kwalifikacja_stan"},{"label":"Nie pamięta","next":"kwalifikacja_stan"}]},"kwalifikacja_stan":{"name":"Kwalifikacja: stan","say":"A urządzenie działa normalnie, czy są jakieś problemy z nim?","tip":"ZAPISZ odpowiedź!","responses":[{"label":"Działa OK","next":"kwalifikacja_malzonek"},{"label":"Ma problemy","next":"kwalifikacja_malzonek"}]},"kwalifikacja_malzonek":{"name":"Kwalifikacja: małżonek","say":"Kto częściej korzysta z Rainbow, Pan/Pani czy ŻONA/MĄŻ? ... Rozumiem.","tip":"Nienachalne badanie, czy w domu jest drugi decydent.","responses":[{"label":"Głównie ja","next":"dwie_nogi"},{"label":"Głównie mąż/żona","next":"dwie_nogi"},{"label":"Oboje używamy","next":"dwie_nogi"},{"label":"Osoba samotna","next":"book_termin"}]},"dwie_nogi":{"name":"Dwie nogi (presupozycja)","say":"Pani/Panie [IMIĘ], jeszcze jedno. Żeby serwisant mógł W PEŁNI WYCENIĆ Państwa obecne urządzenie i przygotować NAJLEPSZĄ MOŻLIWĄ OFERTĘ WYMIANY -- potrzebujemy żeby oboje Państwo byli w domu.\n\nSerwisant omówi z Państwem różne warianty, więc ważne żeby oboje mogli Państwo zadecydować na spokojnie.\n\nPan/Pani ŻONA/MĄŻ też będzie, prawda?","tip":"ZASADA BELFORDA: zakładasz że TAK! Ton pewności, nie pytania. KORZYŚĆ = WARUNEK.","responses":[{"label":"Tak, oboje będziemy","next":"book_termin"},{"label":"W pracy / nie będzie","next":"rebuttal_praca"},{"label":"Sam/sama decyduję","next":"rebuttal_sam_decyduje"},{"label":"Nie obchodzi go/jej","next":"rebuttal_nie_obchodzi"},{"label":"Pracuje na zmiany","next":"rebuttal_zmiany"},{"label":"Niech przyjdzie sam","next":"rebuttal_niech_przyjdzie"}]},"rebuttal_praca":{"name":"Zbicie obiekcji: w pracy","say":"Jasne, całkowicie rozumiem! Właśnie dlatego pytam wcześniej -- żeby znaleźć termin, który pasuje obojgu. Nasi serwisanci pracują też wieczorami i w weekendy. Kiedy oboje Państwo macie spokojniejszy wieczór -- może sobota albo niedziela?","responses":[{"label":"OK, znajdziemy termin","next":"book_termin"},{"label":"Nadal opór","next":"rebuttal_ostateczny"}]},"rebuttal_sam_decyduje":{"name":"Zbicie obiekcji: sam decyduje","say":"Wierzę Pani/Panu! Ale proszę zobaczyć -- serwisant będzie omawiał wycenę Państwa obecnego Rainbow, koszt wykonania prac serwisowych, lub warunki ewentualnej wymiany. To decyzja finansowa która dotyczy obojga Państwa.\n\nGdyby potem musiała Pani to wszystko tłumaczyć mężowi... a on nie widział wyceny, nie słyszał wariantów -- to potem wychodzi niepotrzebne 'ale dlaczego nie poczekałaś'.\n\nLepsza jest ta godzina razem niż potem tydzień dyskusji w domu, prawda? Znajdźmy termin, kiedy oboje Państwo mają chwilę.","responses":[{"label":"OK, wspólny termin","next":"book_termin"},{"label":"Nadal sam/sama","next":"rebuttal_ostateczny"}]},"rebuttal_nie_obchodzi":{"name":"Zbicie obiekcji: nie obchodzi go","say":"Wie Pani co jest ciekawe? Większość mężów mówi tak samo przed wizytą. A potem jak widzą, ile jest wart ich stary Rainbow na wymianę i co potrafi nowy model -- to nagle są bardzo zainteresowani!\n\nNie musi być zainteresowany teraz -- wystarczy że będzie w domu. Godzinka i oboje Państwo będziecie wiedzieli na czym stoicie. Możemy się umówić na sobotę albo niedzielę?","responses":[{"label":"OK, spróbuję namówić","next":"book_termin"},{"label":"Na pewno nie przyjdzie","next":"rebuttal_ostateczny"}]},"rebuttal_zmiany":{"name":"Zbicie obiekcji: praca zmianowa","say":"Rozumiem, to bywa trudne. A kiedy w najbliższych dwóch tygodniach macie taki wieczór, kiedy oboje Państwo jesteście w domu? Może jakiś wolny dzień? Dostosujemy się całkowicie pod Państwa grafik.","responses":[{"label":"Za tydzień-dwa","next":"book_termin"},{"label":"Ciężko ustalić","next":"rebuttal_ostateczny"}]},"rebuttal_niech_przyjdzie":{"name":"Zbicie obiekcji: niech przyjdzie sam","say":"Pani/Panie [IMIĘ], naprawdę chcę, żeby ta wizyta miała dla Państwa sens. Serwisant będzie wyceniał Państwa stary Rainbow, pokazywał różnicę z nowym modelem, omawiał warianty finansowe.\n\nJeśli mąż tego nie zobaczy na własne oczy -- to potem nie może podjąć decyzji, bo nie ma pełnego obrazu. I spotykamy się jeszcze raz, a to strata czasu i dla Państwa, i dla nas.\n\nJedna wspólna godzina -- i oboje Państwo macie pełną wiedzę. Kiedy oboje będziecie w domu?","responses":[{"label":"OK, razem","next":"book_termin"},{"label":"Nadal upiera się","next":"rebuttal_ostateczny"}]},"rebuttal_ostateczny":{"name":"Zbicie obiekcji: ostateczne (oddzwonienie)","say":"Rozumiem. Zróbmy tak -- niech Pani/Pan porozmawia z mężem/żoną kiedy ma wolny wieczór, a ja zadzwonię do Pani jutro o tej samej porze i ustalimy termin. Pasuje?","tip":"ODDZWONIENIE -- NIGDY NIE UMAWIAJ NA JEDNĄ NOGĘ!","responses":[{"label":"OK, zadzwoń jutro","next":"callback_scheduled"},{"label":"Nie, rezygnuję","next":"end_not_interested"}]},"book_termin":{"name":"Zamknięcie terminu","say":"Świetnie! To umawiamy Państwa na [DZIEŃ, DATA] o godzinie [GODZINA].\n\nAdres to [ADRES] -- zgadza się?","responses":[{"label":"Tak, zgadza się","next":"confirm"}]},"confirm":{"name":"Potwierdzenie + 3 warunki","say":"Doskonale! Jeszcze trzy rzeczy:\n\nPO PIERWSZE -- proszę przygotować Państwa obecny Rainbow, żeby serwisant mógł go obejrzeć i wycenić.\nPO DRUGIE -- proszę nie zapraszać sąsiadów ani znajomych, bo serwisant będzie omawiał Państwa indywidualną ofertę i warunki finansowe.\nPO TRZECIE i najważniejsze -- proszę żeby Pan/Pani i ŻONA/MĄŻ na pewno był/a w domu. Tylko wtedy nasz pracownik przedstawi ofertę.\n\nUmówione? (Czekaj na: TAK)\n\nŚwietnie Pani/Panie [IMIĘ]! Widzimy się [DZIEŃ] o [GODZINA]. Miłego dnia!","tip":"WYŚLIJ SMS: Dzień dobry! Tu Marta z Rainbow. Potwierdzam wizytę serwisanta [DZIEŃ] o godz. [GODZINA] -- bezpłatny przegląd i wycena Państwa Rainbow. Prosimy o przygotowanie urządzenia i obecność obojga Państwa! Do zobaczenia!","responses":[{"label":"UMÓWIONO - Zapisz","next":null}]},"objection_cena":{"name":"Obiekcja: cena","say":"Przegląd i wycena są całkowicie bezpłatne. Jeśli chodzi o wymianę -- to zależy od stanu Państwa obecnego urządzenia. Dlatego serwisant musi je obejrzeć i wycenić.\n\nWartość starego Rainbow zalicza się na poczet nowego -- szczegóły poda serwisant na miejscu. Warto zobaczyć, bo to nic nie kosztuje!","responses":[{"label":"OK, umów przegląd","next":"kwalifikacja_model"},{"label":"Nie stać mnie","next":"end_not_interested"}]},"objection_czas":{"name":"Obiekcja: nie mam czasu","say":"Rozumiem, że Państwo są zajęci. Wizyta trwa około godziny. Może weekend albo wieczór -- kiedy Państwo mają spokojniej?","responses":[{"label":"Weekend / wieczór","next":"book_termin"},{"label":"Naprawdę nie mam czasu","next":"callback"}]},"objection_dziala":{"name":"Obiekcja: jeszcze działa","say":"To świetnie! Im w lepszym stanie Państwa urządzenie, tym wyższa jego wartość przy wymianie. Warto wycenić teraz, bo programy wymian nie trwają wiecznie.\n\nA przegląd i tak jest bezpłatny -- więc Państwa nic to nie kosztuje.","responses":[{"label":"OK, niech wyceni","next":"kwalifikacja_model"},{"label":"Nie potrzebuję","next":"end_not_interested"}]},"objection_pomyslec":{"name":"Obiekcja: muszę pomyśleć","say":"Oczywiście! Przegląd jest bezpłatny, więc nie ma żadnego ryzyka. Umówmy termin -- a gdyby coś się zmieniło, zawsze można przenieść. Lepsza rezerwacja teraz, bo terminy serwisantów szybko się zapełniają.","responses":[{"label":"OK, umów","next":"kwalifikacja_model"},{"label":"Za kilka dni","next":"callback"},{"label":"Nie, dziękuję","next":"end_not_interested"}]},"callback":{"name":"Ponowny kontakt","say":"Jasne! Oddzwonię do Pani/Pana jutro -- przed południem czy po południu bardziej pasuje?","tip":"PRESUPOZYCJA: nie pytasz CZY, tylko KIEDY jutro! Wybór między dwoma opcjami = oba rozwiązania są dla Ciebie OK.","responses":[{"label":"Przed południem","next":"callback_scheduled"},{"label":"Po południu","next":"callback_scheduled"},{"label":"Ja zadzwonię","next":"end_callback_client"}]},"callback_scheduled":{"name":"Zaplanowano oddzwonienie","say":"Super! Zapisuję i oddzwonię w ustalonym terminie. Dziękuję, do usłyszenia!","responses":[{"label":"ODDZWONIĆ - Zapisz","next":null}]},"end_wrong_number":{"name":"Zły numer","say":"Przepraszam za pomyłkę. Miłego dnia!","responses":[{"label":"ZŁY NUMER - Zapisz","next":null}]},"end_not_interested":{"name":"Nie zainteresowany","say":"Rozumiem. Dziękuję za rozmowę. Miłego dnia!","responses":[{"label":"NIE ZAINTERESOWANY","next":null}]},"end_no_rainbow":{"name":"Nie ma Rainbow","say":"Rozumiem, program jest dla obecnych właścicieli Rainbow. Mogę w takim razie umówić bezpłatny pokaz nowego sprzętu. Miłego dnia!","responses":[{"label":"NIE MA RAINBOW","next":null}]},"end_callback_client":{"name":"Klient oddzwoni","say":"Oczywiście! Nasz numer wyświetli się w telefonie. Czekam na kontakt. Miłego dnia!","responses":[{"label":"KLIENT ODDZWONI","next":null}]}}};

        // Domyślna kampania
        let SCRIPT_DATA = SCRIPTS.odkurzacz;

        class ScriptEngine {
            constructor(scriptData) {
                this.scriptData = scriptData;
                this.currentStep = 'start';
                this.history = [];
            }

            getCurrentStep() {
                if (!this.scriptData || !this.scriptData.steps[this.currentStep]) {
                    return null;
                }
                return this.scriptData.steps[this.currentStep];
            }

            selectResponse(responseIndex) {
                const currentStep = this.getCurrentStep();
                if (!currentStep || !currentStep.responses[responseIndex]) {
                    return false;
                }

                const response = currentStep.responses[responseIndex];

                this.history.push({
                    step: this.currentStep,
                    stepName: currentStep.name || this.currentStep,
                    said: currentStep.say,
                    response: response.label
                });

                if (response.next === null) {
                    return { end: true, outcome: response.label };
                } else {
                    this.currentStep = response.next;
                    return { end: false };
                }
            }

            goBack() {
                if (this.history.length === 0) {
                    return false;
                }

                this.history.pop();

                if (this.history.length > 0) {
                    const lastHistory = this.history[this.history.length - 1];
                    const lastStep = this.scriptData.steps[lastHistory.step];
                    const lastResponse = lastStep.responses.find(r => r.label === lastHistory.response);
                    this.currentStep = lastResponse.next;
                } else {
                    this.currentStep = 'start';
                }

                return true;
            }

            getHistory() {
                return this.history;
            }
        }

        class ScriptUI {
            constructor(engine) {
                this.engine = engine;
                this.initElements();
                this.attachEventListeners();
                this.render();
            }

            initElements() {
                this.scriptText = document.getElementById('script-text');
                this.responseButtons = document.getElementById('response-buttons');
                this.backBtn = document.getElementById('back-btn');
                this.closeBtn = document.getElementById('close-btn');
                this.historyPanel = document.getElementById('history-panel');
                this.historyList = document.getElementById('history-list');
            }

            attachEventListeners() {
                this.backBtn.addEventListener('click', () => this.handleBack());
                this.closeBtn.addEventListener('click', () => this.handleClose());
                
                const copyBtn = document.getElementById('copy-notes-btn');
                if (copyBtn) {
                    copyBtn.addEventListener('click', () => this.handleCopyNotes());
                }
            }
            
            handleCopyNotes() {
                const notesTextarea = document.getElementById('notes-textarea');
                if (notesTextarea && notesTextarea.value.trim()) {
                    notesTextarea.select();
                    document.execCommand('copy');
                    this.showNotification('✓ Notatki skopiowane do schowka', 'success');
                } else {
                    this.showNotification('Brak notatek do skopiowania', 'warning');
                }
            }

            render() {
                const step = this.engine.getCurrentStep();

                if (!step) {
                    this.showError('Błąd: brak kroku');
                    return;
                }

                this.scriptText.textContent = step.say;

                // Render tip
                const tipEl = document.getElementById('script-tip');
                if (tipEl) {
                    if (step.tip) {
                        tipEl.textContent = step.tip;
                        tipEl.style.display = 'block';
                    } else {
                        tipEl.style.display = 'none';
                    }
                }

                this.responseButtons.innerHTML = '';

                step.responses.forEach((response, index) => {
                    const button = document.createElement('button');
                    button.className = 'response-btn';
                    button.textContent = response.label;

                    const lbl = response.label.toUpperCase();
                    if (lbl.includes('UMOWIONO') || lbl.includes('UMÓWIONO')) {
                        button.classList.add('success');
                    } else if (lbl.includes('NIE ZAINTERESOWANY') || lbl.includes('ZLY NUMER') || lbl.includes('ZŁY NUMER') || lbl.includes('NIE MA RAINBOW')) {
                        button.classList.add('danger');
                    } else if (lbl.includes('ODDZWONIC') || lbl.includes('ODDZWONIĆ') || lbl.includes('CALLBACK') || lbl.includes('KLIENT ODDZWONI')) {
                        button.classList.add('warning');
                    }

                    button.addEventListener('click', () => this.handleResponse(index));
                    this.responseButtons.appendChild(button);
                });

                this.backBtn.style.display = this.engine.history.length > 0 ? 'block' : 'none';
                this.updateHistory();
            }

            handleResponse(index) {
                const result = this.engine.selectResponse(index);

                if (result.end) {
                    this.showSimpleEndScreen(result.outcome);
                } else {
                    this.render();
                }
            }
            
            showSimpleEndScreen(outcome) {
                const container = document.getElementById('script-content');
                // Czyścimy tylko część skryptową, notatki są poniżej w osobnym divie
                container.innerHTML = `
                    <div class="end-screen">
                        <h3>✅ Rozmowa zakończona</h3>
                        <p><strong>Wynik:</strong> ${outcome}</p>
                        <p style="margin-top: 20px;">Skopiuj notatki i zamknij okno.</p>
                    </div>
                `;
                
                this.closeBtn.textContent = '✕ Zamknij';
                this.backBtn.style.display = 'none';
            }

            handleBack() {
                const success = this.engine.goBack();
                if (success) {
                    this.render();
                }
            }

            handleClose() {
                t.closeModal();
            }

            updateHistory() {
                const history = this.engine.getHistory();

                if (history.length === 0) {
                    return;
                }

                this.historyList.innerHTML = '';

                history.forEach((item, index) => {
                    const historyItem = document.createElement('div');
                    historyItem.className = 'history-item';
                    historyItem.textContent = `${index + 1}. ${item.stepName || 'Krok'} -> ${item.response}`;
                    this.historyList.appendChild(historyItem);
                });
            }

            showNotification(message, type = 'info') {
                const notification = document.getElementById('notification');
                notification.textContent = message;
                notification.className = `notification notification-${type}`;
                notification.style.display = 'block';
                
                // Auto-hide after 5 seconds
                setTimeout(() => {
                    notification.style.display = 'none';
                }, 5000);
            }

            showError(message) {
                const container = document.getElementById('script-content');
                container.innerHTML = `
                    <div class="end-screen">
                        <h3>Błąd</h3>
                        <p>${message}</p>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            let scriptEngine = new ScriptEngine(SCRIPT_DATA);
            let scriptUI = new ScriptUI(scriptEngine);
            document.getElementById('script-title').textContent = SCRIPT_DATA.name;

            // Przełączanie kampanii
            document.getElementById('campaign-selector').addEventListener('change', function(e) {
                SCRIPT_DATA = SCRIPTS[e.target.value];
                scriptEngine = new ScriptEngine(SCRIPT_DATA);
                document.getElementById('script-title').textContent = SCRIPT_DATA.name;
                // Przywróć oryginalny HTML script-content
                document.getElementById('script-content').innerHTML = `
                    <div id="script-text-box">
                        <div class="label">POWIEDZ:</div>
                        <div id="script-text" class="speech-box-large"></div>
                        <div id="script-tip" class="tip-box" style="display:none;"></div>
                    </div>
                    <div id="responses-section">
                        <div class="label">KLIENT ODPOWIEDZIAŁ:</div>
                        <div id="response-buttons" class="response-grid"></div>
                    </div>
                `;
                scriptUI = new ScriptUI(scriptEngine);
                // Wyczyść notatki przy zmianie kampanii
                const notes = document.getElementById('notes-textarea');
                if (notes) notes.value = '';
            });
        });
    </script>
